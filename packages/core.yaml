# Climate component
external_components:
  - source:
      url: https://github.com/chindocaine/tclac.git
      type: git
      ref: master
    components: [ tclac ]
    refresh: 30s

# ESPHome configuration
esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  min_version: 2025.11.0
  on_boot:
    priority: -100
    then:
      lambda: !lambda |-
        id(air_conditioner).set_beeper_state(false);
        id(air_conditioner).set_force_mode_state(false);
        
        if (id(display_mode).state){
          id(air_conditioner).set_display_state(true);
        } else {
          id(air_conditioner).set_display_state(false);
        }
        if (id(ledflash_mode).state){
          id(air_conditioner).set_module_display_state(true);
        } else {
          id(air_conditioner).set_module_display_state(false);
        }
        
        if (id(vswing).active_index() == 0){
          id(air_conditioner).set_vertical_swing_direction(esphome::tclac::VerticalSwingDirection::UP_DOWN);
        } else if (id(vswing).active_index() == 1){
          id(air_conditioner).set_vertical_swing_direction(esphome::tclac::VerticalSwingDirection::UPSIDE);
        } else if (id(vswing).active_index() == 2){
          id(air_conditioner).set_vertical_swing_direction(esphome::tclac::VerticalSwingDirection::DOWNSIDE);
        }

        if (id(hswing).active_index() == 0){
          id(air_conditioner).set_horizontal_swing_direction(esphome::tclac::HorizontalSwingDirection::LEFT_RIGHT);
        } else if (id(hswing).active_index() == 1){
          id(air_conditioner).set_horizontal_swing_direction(esphome::tclac::HorizontalSwingDirection::LEFTSIDE);
        } else if (id(hswing).active_index() == 2){
          id(air_conditioner).set_horizontal_swing_direction(esphome::tclac::HorizontalSwingDirection::CENTER);
        } else if (id(hswing).active_index() == 3){
          id(air_conditioner).set_horizontal_swing_direction(esphome::tclac::HorizontalSwingDirection::RIGHTSIDE);
        }
        
        if (id(vfixing).active_index() == 0){
          id(air_conditioner).set_vertical_airflow(esphome::tclac::AirflowVerticalDirection::LAST);
        } else if (id(vfixing).active_index() == 1){
          id(air_conditioner).set_vertical_airflow(esphome::tclac::AirflowVerticalDirection::MAX_UP);
        } else if (id(vfixing).active_index() == 2){
          id(air_conditioner).set_vertical_airflow(esphome::tclac::AirflowVerticalDirection::UP);
        } else if (id(vfixing).active_index() == 3){
          id(air_conditioner).set_vertical_airflow(esphome::tclac::AirflowVerticalDirection::CENTER);
        } else if (id(vfixing).active_index() == 4){
          id(air_conditioner).set_vertical_airflow(esphome::tclac::AirflowVerticalDirection::DOWN);
        } else if (id(vfixing).active_index() == 5){
          id(air_conditioner).set_vertical_airflow(esphome::tclac::AirflowVerticalDirection::MAX_DOWN);
        }
        
        if (id(hfixing).active_index() == 0){
          id(air_conditioner).set_horizontal_airflow(esphome::tclac::AirflowHorizontalDirection::LAST);
        } else if (id(hfixing).active_index() == 1){
          id(air_conditioner).set_horizontal_airflow(esphome::tclac::AirflowHorizontalDirection::MAX_LEFT);
        } else if (id(hfixing).active_index() == 2){
          id(air_conditioner).set_horizontal_airflow(esphome::tclac::AirflowHorizontalDirection::LEFT);
        } else if (id(hfixing).active_index() == 3){
          id(air_conditioner).set_horizontal_airflow(esphome::tclac::AirflowHorizontalDirection::CENTER);
        } else if (id(hfixing).active_index() == 4){
          id(air_conditioner).set_horizontal_airflow(esphome::tclac::AirflowHorizontalDirection::RIGHT);
        } else if (id(hfixing).active_index() == 5){
          id(air_conditioner).set_horizontal_airflow(esphome::tclac::AirflowHorizontalDirection::MAX_RIGHT);
        }
        if (id(beep_mode).state){
          id(air_conditioner).set_beeper_state(true);
        } else {
          id(air_conditioner).set_beeper_state(false);
        }
        if (id(force_mode).state){
          id(air_conditioner).set_force_mode_state(true);
        } else {
          id(air_conditioner).set_force_mode_state(false);
        }

uart:
  baud_rate: 9600
  data_bits: 8
  parity: EVEN
  stop_bits: 1
  rx_pin: ${uart_rx}
  tx_pin: ${uart_tx}

api:
  encryption:
    key: "${api_key}"

ota:
- platform: esphome
  password: "${ota_pass}"

wifi:
  id: "${device_name}_wifi"
  ssid: ${wifi_ssid}
  password: ${wifi_password}
  ap:
    ssid: "${device_name} Fallback Hotspot"
    password: "${recovery_pass}"

captive_portal:


# MUST disable logging via UART
logger:
  baud_rate: 0

# Device settings section:
# - Switches
switch:
  # Beeper to confirm commands, disabled by default
  - name: Beeper
    platform: template
    device_class: switch
    id: beep_mode
    entity_category: config
    restore_mode: RESTORE_DEFAULT_ON
    optimistic: true
    on_turn_on:
      then:
        lambda: !lambda |-
          id(air_conditioner).set_beeper_state(true);
    on_turn_off:
      then:
        lambda: !lambda |-
          id(air_conditioner).set_beeper_state(false);
  
  # Temperature setpoint indicator on the indoor unit body, enabled by default
  - name: Display
    platform: template
    device_class: switch
    id: display_mode
    entity_category: config
    restore_mode: RESTORE_DEFAULT_ON
    optimistic: true
    on_turn_on:
      then:
        lambda: !lambda |-
          id(air_conditioner).set_display_state(true);
    on_turn_off:
      then:
        lambda: !lambda |-
          id(air_conditioner).set_display_state(false);
  
  # LED indication of data exchange with the air conditioner, disabled by default
  - name: Display on module
    platform: template
    device_class: switch
    id: ledflash_mode
    entity_category: config
    restore_mode: RESTORE_DEFAULT_ON
    optimistic: true
    on_turn_on:
      then:
        lambda: !lambda |-
          id(air_conditioner).set_module_display_state(true);
    on_turn_off:
      then:
        lambda: !lambda |-
          id(air_conditioner).set_module_display_state(false);
          
  - name: Force config
    platform: template
    device_class: switch
    id: force_mode
    entity_category: config
    restore_mode: RESTORE_DEFAULT_ON
    optimistic: true
    on_turn_on:
      then:
        lambda: !lambda |-
          id(air_conditioner).set_force_mode_state(true);
    on_turn_off:
      then:
        lambda: !lambda |-
          id(air_conditioner).set_force_mode_state(false);

# - Dropdown lists
select:
  # Vertical swing setting
  - platform: template
    name: Vertical swing
    id: vswing
    entity_category: config
    options:
      - "Up and down"
      - "In upper half"
      - "In lower half"
    optimistic: true
    restore_value: true
    on_value:
      then:
        lambda: !lambda |-
          if (id(vswing).active_index() == 0){
            id(air_conditioner).set_vertical_swing_direction(esphome::tclac::VerticalSwingDirection::UP_DOWN);
          } else if (id(vswing).active_index() == 1){
            id(air_conditioner).set_vertical_swing_direction(esphome::tclac::VerticalSwingDirection::UPSIDE);
          } else if (id(vswing).active_index() == 2){
            id(air_conditioner).set_vertical_swing_direction(esphome::tclac::VerticalSwingDirection::DOWNSIDE);
          }

  # Horizontal swing setting
  - platform: template
    name: Horizontal swing
    id: hswing
    entity_category: config
    options:
      - "Left to right"
      - "In left part"
      - "In center"
      - "In right part"
    optimistic: true
    restore_value: true
    on_value:
      then:
        lambda: !lambda |-
          if (id(hswing).active_index() == 0){
            id(air_conditioner).set_horizontal_swing_direction(esphome::tclac::HorizontalSwingDirection::LEFT_RIGHT);
          } else if (id(hswing).active_index() == 1){
            id(air_conditioner).set_horizontal_swing_direction(esphome::tclac::HorizontalSwingDirection::LEFTSIDE);
          } else if (id(hswing).active_index() == 2){
            id(air_conditioner).set_horizontal_swing_direction(esphome::tclac::HorizontalSwingDirection::CENTER);
          } else if (id(hswing).active_index() == 3){
            id(air_conditioner).set_horizontal_swing_direction(esphome::tclac::HorizontalSwingDirection::RIGHTSIDE);
          }

  # Vertical louver fixation setting
  - platform: template
    name: Vertical fixing
    id: vfixing
    entity_category: config
    options:
      - "Last position"
      - "All the way up"
      - "In upper half"
      - "In center"
      - "In lower half"
      - "All the way down"
    optimistic: true
    restore_value: true
    on_value:
      then:
        lambda: !lambda |-
          if (id(vfixing).active_index() == 0){
            id(air_conditioner).set_vertical_airflow(esphome::tclac::AirflowVerticalDirection::LAST);
          } else if (id(vfixing).active_index() == 1){
            id(air_conditioner).set_vertical_airflow(esphome::tclac::AirflowVerticalDirection::MAX_UP);
          } else if (id(vfixing).active_index() == 2){
            id(air_conditioner).set_vertical_airflow(esphome::tclac::AirflowVerticalDirection::UP);
          } else if (id(vfixing).active_index() == 3){
            id(air_conditioner).set_vertical_airflow(esphome::tclac::AirflowVerticalDirection::CENTER);
          } else if (id(vfixing).active_index() == 4){
            id(air_conditioner).set_vertical_airflow(esphome::tclac::AirflowVerticalDirection::DOWN);
          } else if (id(vfixing).active_index() == 5){
            id(air_conditioner).set_vertical_airflow(esphome::tclac::AirflowVerticalDirection::MAX_DOWN);
          }

  # Horizontal louver fixation setting
  - platform: template
    name: Horizontal fixing
    id: hfixing
    entity_category: config
    options:
      - "Last position"
      - "All the way left"
      - "In left half"
      - "In center"
      - "In right half"
      - "All the way right"
    optimistic: true
    restore_value: true
    on_value:
      then:
        lambda: !lambda |-
          if (id(hfixing).active_index() == 0){
            id(air_conditioner).set_horizontal_airflow(esphome::tclac::AirflowHorizontalDirection::LAST);
          } else if (id(hfixing).active_index() == 1){
            id(air_conditioner).set_horizontal_airflow(esphome::tclac::AirflowHorizontalDirection::MAX_LEFT);
          } else if (id(hfixing).active_index() == 2){
            id(air_conditioner).set_horizontal_airflow(esphome::tclac::AirflowHorizontalDirection::LEFT);
          } else if (id(hfixing).active_index() == 3){
            id(air_conditioner).set_horizontal_airflow(esphome::tclac::AirflowHorizontalDirection::CENTER);
          } else if (id(hfixing).active_index() == 4){
            id(air_conditioner).set_horizontal_airflow(esphome::tclac::AirflowHorizontalDirection::RIGHT);
          } else if (id(hfixing).active_index() == 5){
            id(air_conditioner).set_horizontal_airflow(esphome::tclac::AirflowHorizontalDirection::MAX_RIGHT);
          }

climate:
  - platform: tclac
    name: "Air Conditioner"
    id: air_conditioner